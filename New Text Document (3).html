<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Salitha Tech Hub | Next-Gen AI & Dev Resources</title>
  <!-- Google Fonts + Font Awesome 6 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c10;
      color: #eef2ff;
      line-height: 1.5;
      scroll-behavior: smooth;
    }

    /* dark neon tech theme */
    :root {
      --bg-primary: #0a0c10;
      --bg-card: #11161f;
      --border-glow: rgba(0, 255, 255, 0.2);
      --neon-blue: #00e0ff;
      --neon-purple: #b77cff;
      --accent-gradient: linear-gradient(135deg, #00e0ff, #b77cff);
      --text-light: #f0f3fa;
      --text-muted: #9ca3af;
    }

    /* glassmorphism container */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 2rem;
      background: rgba(10, 12, 16, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 224, 255, 0.25);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-light);
      font-weight: 500;
      transition: 0.2s;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--neon-blue);
      text-shadow: 0 0 4px rgba(0,224,255,0.5);
    }

    /* hero */
    .hero {
      padding: 5rem 0 4rem;
      text-align: center;
    }

    .hero h1 {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, var(--neon-blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero p {
      font-size: 1.2rem;
      color: var(--text-muted);
      margin-top: 1rem;
    }

    /* cards grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      margin: 3rem 0;
    }

    .card {
      background: var(--bg-card);
      border-radius: 1.5rem;
      padding: 1.5rem;
      border: 1px solid rgba(0, 224, 255, 0.2);
      transition: all 0.25s ease;
      backdrop-filter: blur(2px);
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: var(--neon-blue);
      box-shadow: 0 15px 30px -12px rgba(0,224,255,0.15);
    }

    /* prompt card image style */
    .prompt-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 1rem;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #1a1f2e, #0f1119);
    }

    .prompt-text-area {
      background: rgba(0, 0, 0, 0.4);
      padding: 0.8rem;
      border-radius: 0.8rem;
      border-left: 3px solid var(--neon-blue);
      margin: 0.8rem 0;
      font-family: monospace;
      font-size: 0.9rem;
      color: #cbd5e6;
      word-break: break-word;
    }

    .video-wrapper iframe {
      width: 100%;
      border-radius: 1rem;
      aspect-ratio: 16 / 9;
    }

    .btn-copy {
      background: transparent;
      border: 1px solid var(--neon-blue);
      color: var(--neon-blue);
      padding: 0.6rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
      margin-top: 0.5rem;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-copy:hover {
      background: var(--neon-blue);
      color: #0a0c10;
      box-shadow: 0 0 10px var(--neon-blue);
    }

    /* blog meta */
    .blog-date {
      font-size: 0.75rem;
      color: var(--neon-blue);
      margin-top: 0.5rem;
    }

    .read-more {
      display: inline-block;
      margin-top: 0.8rem;
      color: var(--neon-blue);
      text-decoration: none;
      font-weight: 600;
    }

    /* modal for full blog */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: var(--bg-card);
      max-width: 700px;
      width: 90%;
      border-radius: 2rem;
      padding: 2rem;
      border: 1px solid var(--neon-blue);
      position: relative;
    }
    .close-modal {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      font-size: 1.8rem;
      cursor: pointer;
      color: var(--text-muted);
    }

    /* search & filter */
    .search-filter {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 1rem;
      margin: 2rem 0;
    }
    #searchInput, #searchInputPrompts {
      background: #11161f;
      border: 1px solid #2a3440;
      padding: 0.7rem 1.2rem;
      border-radius: 2rem;
      width: 280px;
      color: white;
      font-size: 0.9rem;
    }
    .filter-buttons {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid #2a3440;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--neon-blue);
      color: #0a0c10;
      border-color: var(--neon-blue);
    }

    .toast-message {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #00e0ff;
      color: #0a0c10;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: bold;
      z-index: 2000;
      animation: fadeOut 2s forwards;
      box-shadow: 0 0 15px rgba(0,224,255,0.6);
    }
    @keyframes fadeOut {
      0% { opacity: 1; transform: translateY(0);}
      70% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-20px); visibility: hidden; }
    }

    footer {
      margin-top: 4rem;
      padding: 2rem;
      border-top: 1px solid rgba(0,224,255,0.2);
      text-align: center;
    }
    .social-icons a {
      color: var(--text-muted);
      font-size: 1.6rem;
      margin: 0 0.8rem;
      transition: 0.2s;
    }
    .social-icons a:hover {
      color: var(--neon-blue);
    }

    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        gap: 1rem;
      }
      .nav-links {
        gap: 1.2rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      .hero h1 {
        font-size: 2.2rem;
      }
      .container {
        padding: 0 1.2rem;
      }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo">⚡ Salitha Tech Hub</div>
  <div class="nav-links">
    <a href="#" data-page="home">Home</a>
    <a href="#" data-page="videos">Videos</a>
    <a href="#" data-page="blog">Blog</a>
    <a href="#" data-page="prompts">Prompts</a>
    <a href="#" data-page="contact">Contact</a>
  </div>
</nav>

<main id="app-root">
  <!-- dynamic content will be injected -->
</main>

<footer>
  <div class="social-icons">
    <a href="#"><i class="fab fa-youtube"></i></a>
    <a href="#"><i class="fab fa-facebook"></i></a>
    <a href="#"><i class="fab fa-twitter"></i></a>
    <a href="#"><i class="fab fa-github"></i></a>
  </div>
  <p style="margin-top: 1rem;">&copy; 2025 Salitha Tech Hub — Innovate. Build. Inspire.</p>
</footer>

<!-- Modal for full blog -->
<div id="blogModal" class="modal">
  <div class="modal-content">
    <span class="close-modal">&times;</span>
    <h2 id="modalTitle"></h2>
    <img id="modalImage" style="width:100%; border-radius:1rem; margin:1rem 0;" alt="blog">
    <div id="modalContent"></div>
    <small id="modalDate"></small>
  </div>
</div>

<script>
  // ---------- SAMPLE DATA WITH PROMPT IMAGES ----------
  const videosData = [
    { id: 1, title: "Build AI Apps with GPT-4", description: "Learn how to integrate OpenAI API like a pro.", embedCode: '<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video" frameborder="0" allowfullscreen></iframe>' },
    { id: 2, title: "Modern Web Dev Crash Course", description: "Master HTML/CSS/JS with neon design trends.", embedCode: '<iframe src="https://www.youtube.com/embed/8m5_2E1bWb0" title="Web crash course" frameborder="0" allowfullscreen></iframe>' },
    { id: 3, title: "Prompt Engineering Secrets", description: "Boost your AI output quality.", embedCode: '<iframe src="https://www.youtube.com/embed/jpNo4EcVKRs" title="Prompt secrets" frameborder="0" allowfullscreen></iframe>' }
  ];

  const blogsData = [
    { id: 1, title: "Why LLMs are reshaping tech", image: "https://picsum.photos/id/1/400/200", content: "Full article: Large Language Models have revolutionized how we interact with machines. This comprehensive guide explores real-world applications and future trends.", date: "March 12, 2025" },
    { id: 2, title: "Building a Neon Design System", image: "https://picsum.photos/id/26/400/200", content: "Step-by-step tutorial on creating glassmorphic cards, neon borders, and smooth animations for modern SaaS products.", date: "April 5, 2025" },
    { id: 3, title: "Top 10 AI Tools for Devs", image: "https://picsum.photos/id/91/400/200", content: "From Copilot to Midjourney — boost your productivity and ship faster with these 10 innovative AI tools.", date: "March 28, 2025" }
  ];

  // Updated prompts data with images and full prompt text
  const promptsData = [
    { 
      id: 1, 
      title: "Code Explainer", 
      description: "Explain any complex code snippet step by step as if I'm a junior dev.",
      promptText: "Act as a senior software engineer. Explain the following code line-by-line, including time complexity and edge cases: [INSERT CODE]",
      imageUrl: "https://picsum.photos/id/0/400/200"   // laptop code style
    },
    { 
      id: 2, 
      title: "UX Copywriter", 
      description: "Generate engaging microcopy for buttons, error messages, and onboarding flows.",
      promptText: "You are a UX writing expert. Create 5 variations of microcopy for a [product type]. Include button text, placeholder hints, and success messages. Tone: friendly & modern.",
      imageUrl: "https://picsum.photos/id/20/400/200"
    },
    { 
      id: 3, 
      title: "SQL Optimizer", 
      description: "Rewrite messy SQL queries into efficient, indexed-friendly versions.",
      promptText: "Rewrite the following SQL query to be more efficient: [PASTE SLOW QUERY]. Add proper indexing recommendations and explain the performance gains.",
      imageUrl: "https://picsum.photos/id/29/400/200"
    },
    { 
      id: 4, 
      title: "React Component Architect", 
      description: "Design a reusable component structure with hooks and TypeScript.",
      promptText: "Design a reusable React component for [DESCRIBE UI]. Include TypeScript props, custom hooks for logic, and proper memoization patterns. Provide complete code.",
      imageUrl: "https://picsum.photos/id/96/400/200"
    },
    { 
      id: 5, 
      title: "AI Marketing Strategy", 
      description: "Generate data-driven campaign ideas for tech products.",
      promptText: "Act as a growth hacker. Propose 3 AI-powered marketing strategies for a SaaS startup targeting developers. Include channels, KPIs, and budget-friendly tactics.",
      imageUrl: "https://picsum.photos/id/26/400/200"
    }
  ];

  // global state
  let currentPage = "home";
  let searchTerm = "";
  let activeFilter = "all";

  // Toast notification helper
  function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast-message';
    toast.innerText = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }

  // Helper: copy prompt text to clipboard
  function copyPromptText(promptText) {
    navigator.clipboard.writeText(promptText).then(() => {
      showToast("✅ Prompt copied to clipboard!");
    }).catch(() => {
      showToast("❌ Copy failed. Manual copy needed.");
    });
  }

  // escape html
  function escapeHtml(str) {
    if(!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if(m === '&') return '&amp;';
      if(m === '<') return '&lt;';
      if(m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // render homepage
  function renderHome() {
    return `
      <div class="hero">
        <h1>Salitha Tech Hub</h1>
        <p>Next‑gen AI resources · Developer tutorials · Premium prompts</p>
      </div>
      <div class="container">
        <div style="display:flex; gap:2rem; flex-wrap:wrap; justify-content:center; margin-bottom:3rem;">
          <div class="card" style="text-align:center; flex:1;">
            <i class="fas fa-code" style="font-size:2.5rem; color:var(--neon-blue);"></i>
            <h3>100+ Video Tutorials</h3>
            <p>Hands-on coding & AI breakthroughs</p>
          </div>
          <div class="card" style="text-align:center; flex:1;">
            <i class="fas fa-blog" style="font-size:2.5rem; color:var(--neon-blue);"></i>
            <h3>Tech Insights</h3>
            <p>Stay ahead with expert articles</p>
          </div>
          <div class="card" style="text-align:center; flex:1;">
            <i class="fas fa-brain" style="font-size:2.5rem; color:var(--neon-blue);"></i>
            <h3>Prompt Library</h3>
            <p>Copy ready-to-use AI prompts + images</p>
          </div>
        </div>
        <div style="text-align:center; padding:2rem; border-radius:2rem; background:rgba(0,224,255,0.05);">
          <h3>⚡ Launch your AI journey</h3>
          <p style="color:var(--text-muted);">Videos, blogs, and powerful prompts with images — all in one hub.</p>
        </div>
      </div>
    `;
  }

  // Videos section
  function renderVideos() {
    let html = `<div class="container"><h2 style="margin:2rem 0 0 0;">📺 Latest Tech Videos</h2><div class="grid">`;
    videosData.forEach(vid => {
      html += `
        <div class="card">
          <div class="video-wrapper">${vid.embedCode}</div>
          <h3 style="margin-top:0.8rem;">${escapeHtml(vid.title)}</h3>
          <p>${escapeHtml(vid.description)}</p>
        </div>
      `;
    });
    html += `</div></div>`;
    return html;
  }

  // Blog section with search 
  function renderBlog() {
    let filteredBlogs = blogsData.filter(blog => 
      blog.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
      blog.content.toLowerCase().includes(searchTerm.toLowerCase())
    );
    let html = `<div class="container"><h2 style="margin:1rem 0;">✍️ Tech Blog</h2>
      <div class="search-filter">
        <input type="text" id="searchInput" placeholder="🔍 Search blog posts..." value="${escapeHtml(searchTerm)}">
        <div class="filter-buttons">
          <button class="filter-btn ${activeFilter === 'all' ? 'active' : ''}" data-filter="all">All</button>
          <button class="filter-btn ${activeFilter === 'trending' ? 'active' : ''}" data-filter="trending">Trending</button>
        </div>
      </div>
      <div class="grid" id="blogGrid">`;
    filteredBlogs.forEach(blog => {
      html += `
        <div class="card blog-card" data-id="${blog.id}">
          <img src="${blog.image}" style="width:100%; border-radius:1rem; height:180px; object-fit:cover;" alt="blog">
          <h3>${escapeHtml(blog.title)}</h3>
          <div class="blog-date">📅 ${blog.date}</div>
          <p>${escapeHtml(blog.content.substring(0, 90))}...</p>
          <a href="#" class="read-more" data-id="${blog.id}">Read full article →</a>
        </div>
      `;
    });
    html += `</div></div>`;
    return html;
  }

  // PROMPTS Library with image on top + prompt text below, and copy button
  function renderPrompts() {
    let filteredPrompts = promptsData.filter(p => 
      p.title.toLowerCase().includes(searchTerm.toLowerCase()) || 
      p.description.toLowerCase().includes(searchTerm.toLowerCase()) ||
      p.promptText.toLowerCase().includes(searchTerm.toLowerCase())
    );
    let html = `<div class="container"><h2 style="margin:2rem 0 0;">🧠 AI Prompt Library</h2>
      <div class="search-filter">
        <input type="text" id="searchInputPrompts" placeholder="Search prompts by title, description or prompt text..." value="${escapeHtml(searchTerm)}">
      </div>
      <div class="grid">`;
    
    filteredPrompts.forEach(p => {
      // safely escape prompt text for display & copying
      const plainPromptText = p.promptText;
      html += `
        <div class="card">
          <img src="${p.imageUrl}" class="prompt-image" alt="${escapeHtml(p.title)} illustration">
          <h3><i class="fas fa-terminal"></i> ${escapeHtml(p.title)}</h3>
          <p style="color: #b0c4de; margin-bottom: 0.5rem;">${escapeHtml(p.description)}</p>
          <div class="prompt-text-area" id="promptText-${p.id}">
            💡 "${escapeHtml(plainPromptText.length > 120 ? plainPromptText.substring(0, 120) + '...' : plainPromptText)}"
          </div>
          <button class="btn-copy" data-prompt-full="${escapeHtml(plainPromptText)}" data-prompt-id="${p.id}">
            <i class="fas fa-copy"></i> Copy Full Prompt
          </button>
        </div>
      `;
    });
    html += `</div></div>`;
    return html;
  }

  // Contact page
  function renderContact() {
    return `
      <div class="container" style="max-width:700px; margin: 3rem auto;">
        <div class="card" style="text-align:center;">
          <h2><i class="fas fa-envelope"></i> Get in touch</h2>
          <p style="margin:1rem 0;">Have questions or collab ideas? Reach out to our team.</p>
          <form id="contactForm" style="display:flex; flex-direction:column; gap:1rem;">
            <input type="text" placeholder="Your Name" style="padding:0.8rem; border-radius:2rem; border:none; background:#1a1f2a; color:white;">
            <input type="email" placeholder="Email address" style="padding:0.8rem; border-radius:2rem; border:none; background:#1a1f2a; color:white;">
            <textarea placeholder="Message" rows="4" style="padding:0.8rem; border-radius:1.5rem; background:#1a1f2a; border:none; color:white;"></textarea>
            <button type="submit" style="background:var(--neon-blue); border:none; padding:0.8rem; border-radius:2rem; font-weight:bold; cursor:pointer;">Send Message</button>
          </form>
          <p style="margin-top:1rem; font-size:0.8rem;">📧 hello@salithatech.com</p>
        </div>
      </div>
    `;
  }

  // Attach dynamic events after rendering each page
  function attachPageEvents() {
    // Blog read more modal
    document.querySelectorAll('.read-more').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        const blogId = parseInt(btn.getAttribute('data-id'));
        const blog = blogsData.find(b => b.id === blogId);
        if(blog) {
          document.getElementById('modalTitle').innerText = blog.title;
          document.getElementById('modalImage').src = blog.image;
          document.getElementById('modalContent').innerHTML = `<p>${escapeHtml(blog.content)}</p>`;
          document.getElementById('modalDate').innerText = blog.date;
          document.getElementById('blogModal').style.display = 'flex';
        }
      });
    });

    // Copy buttons for prompts (enhanced)
    document.querySelectorAll('.btn-copy').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        const fullPrompt = btn.getAttribute('data-prompt-full');
        if(fullPrompt) {
          copyPromptText(fullPrompt);
        } else {
          // fallback: try to find sibling prompt text area
          const card = btn.closest('.card');
          const promptDiv = card?.querySelector('.prompt-text-area');
          let promptToCopy = "";
          if(promptDiv) {
            let raw = promptDiv.innerText.replace(/^💡\s*"/, '').replace(/"$/, '');
            promptToCopy = raw;
          } else {
            promptToCopy = "Prompt text not available";
          }
          copyPromptText(promptToCopy);
        }
      });
    });

    // Search input for blog
    const searchInputBlog = document.getElementById('searchInput');
    if(searchInputBlog) {
      searchInputBlog.addEventListener('input', (e) => {
        searchTerm = e.target.value;
        if(currentPage === 'blog') renderPage('blog');
      });
    }
    // Search input for prompts
    const searchPromptInput = document.getElementById('searchInputPrompts');
    if(searchPromptInput) {
      searchPromptInput.addEventListener('input', (e) => {
        searchTerm = e.target.value;
        if(currentPage === 'prompts') renderPage('prompts');
      });
    }

    // filter buttons for blog
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const filter = e.target.getAttribute('data-filter');
        activeFilter = filter;
        if(currentPage === 'blog') renderPage('blog');
      });
    });

    // Contact form handling
    const contactForm = document.getElementById('contactForm');
    if(contactForm) {
      contactForm.addEventListener('submit', (e) => {
        e.preventDefault();
        showToast("✨ Message sent! (demo mode)");
        contactForm.reset();
      });
    }

    // Modal close
    const modal = document.getElementById('blogModal');
    const closeSpan = document.querySelector('.close-modal');
    if(closeSpan) {
      closeSpan.onclick = () => modal.style.display = 'none';
      window.onclick = (e) => { if(e.target === modal) modal.style.display = 'none'; };
    }
  }

  // main renderer
  function renderPage(page) {
    currentPage = page;
    let content = '';
    if(page === 'home') content = renderHome();
    else if(page === 'videos') content = renderVideos();
    else if(page === 'blog') content = renderBlog();
    else if(page === 'prompts') content = renderPrompts();
    else if(page === 'contact') content = renderContact();
    else content = renderHome();

    document.getElementById('app-root').innerHTML = content;
    
    // reattach events
    if(page === 'blog' || page === 'prompts' || page === 'contact') {
      attachPageEvents();
    } else {
      attachPageEvents(); // safe for home/videos (no specific copy but modals etc)
    }

    // active nav link highlight
    document.querySelectorAll('.nav-links a').forEach(link => {
      if(link.getAttribute('data-page') === page) link.classList.add('active');
      else link.classList.remove('active');
    });
    
    // restore search inputs values
    if(page === 'blog') {
      const sInput = document.getElementById('searchInput');
      if(sInput) sInput.value = searchTerm;
    }
    if(page === 'prompts') {
      const sPrompt = document.getElementById('searchInputPrompts');
      if(sPrompt) sPrompt.value = searchTerm;
      // reattach copy as extra safety after dynamic
      document.querySelectorAll('.btn-copy').forEach(btn => {
        btn.removeEventListener('click', () => {});
        btn.addEventListener('click', (e) => {
          const promptFull = btn.getAttribute('data-prompt-full');
          if(promptFull) copyPromptText(promptFull);
        });
      });
    }
    
    if(page === 'blog') {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          activeFilter = e.target.getAttribute('data-filter');
          renderPage('blog');
        });
      });
    }
  }

  // navigation initialization
  function initNavigation() {
    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const page = link.getAttribute('data-page');
        searchTerm = "";   // reset search when navigating between main sections
        if(page === 'blog' || page === 'prompts') searchTerm = ""; 
        renderPage(page);
      });
    });
  }

  // initial load
  renderPage('home');
  initNavigation();
</script>
</body>
</html>
