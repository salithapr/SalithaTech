<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Salitha Tech Hub | Next-Gen AI & Dev Resources</title>
  <!-- Google Fonts + Font Awesome 6 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c10;
      color: #eef2ff;
      line-height: 1.5;
      scroll-behavior: smooth;
    }

    /* dark neon tech theme */
    :root {
      --bg-primary: #0a0c10;
      --bg-card: #11161f;
      --border-glow: rgba(0, 255, 255, 0.2);
      --neon-blue: #00e0ff;
      --neon-purple: #b77cff;
      --accent-gradient: linear-gradient(135deg, #00e0ff, #b77cff);
      --text-light: #f0f3fa;
      --text-muted: #9ca3af;
    }

    /* glassmorphism container */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 2rem;
      background: rgba(10, 12, 16, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 224, 255, 0.25);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-light);
      font-weight: 500;
      transition: 0.2s;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--neon-blue);
      text-shadow: 0 0 4px rgba(0,224,255,0.5);
    }

    /* hero */
    .hero {
      padding: 5rem 0 4rem;
      text-align: center;
    }

    .hero h1 {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, var(--neon-blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero p {
      font-size: 1.2rem;
      color: var(--text-muted);
      margin-top: 1rem;
    }

    /* cards grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      margin: 3rem 0;
    }

    .card {
      background: var(--bg-card);
      border-radius: 1.5rem;
      padding: 1.5rem;
      border: 1px solid rgba(0, 224, 255, 0.2);
      transition: all 0.25s ease;
      backdrop-filter: blur(2px);
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: var(--neon-blue);
      box-shadow: 0 15px 30px -12px rgba(0,224,255,0.15);
    }

    .video-wrapper iframe {
      width: 100%;
      border-radius: 1rem;
      aspect-ratio: 16 / 9;
    }

    .prompt-content {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .btn-copy {
      background: transparent;
      border: 1px solid var(--neon-blue);
      color: var(--neon-blue);
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
      margin-top: 0.5rem;
    }

    .btn-copy:hover {
      background: var(--neon-blue);
      color: #0a0c10;
      box-shadow: 0 0 10px var(--neon-blue);
    }

    /* blog meta */
    .blog-date {
      font-size: 0.75rem;
      color: var(--neon-blue);
      margin-top: 0.5rem;
    }

    .read-more {
      display: inline-block;
      margin-top: 0.8rem;
      color: var(--neon-blue);
      text-decoration: none;
      font-weight: 600;
    }

    /* modal for full blog */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: var(--bg-card);
      max-width: 700px;
      width: 90%;
      border-radius: 2rem;
      padding: 2rem;
      border: 1px solid var(--neon-blue);
      position: relative;
    }
    .close-modal {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      font-size: 1.8rem;
      cursor: pointer;
      color: var(--text-muted);
    }

    /* search & filter */
    .search-filter {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 1rem;
      margin: 2rem 0;
    }
    #searchInput {
      background: #11161f;
      border: 1px solid #2a3440;
      padding: 0.7rem 1.2rem;
      border-radius: 2rem;
      width: 260px;
      color: white;
    }
    .filter-buttons {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid #2a3440;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--neon-blue);
      color: #0a0c10;
      border-color: var(--neon-blue);
    }

    footer {
      margin-top: 4rem;
      padding: 2rem;
      border-top: 1px solid rgba(0,224,255,0.2);
      text-align: center;
    }
    .social-icons a {
      color: var(--text-muted);
      font-size: 1.6rem;
      margin: 0 0.8rem;
      transition: 0.2s;
    }
    .social-icons a:hover {
      color: var(--neon-blue);
    }

    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        gap: 1rem;
      }
      .nav-links {
        gap: 1.2rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      .hero h1 {
        font-size: 2.2rem;
      }
      .container {
        padding: 0 1.2rem;
      }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo">⚡ Salitha Tech Hub</div>
  <div class="nav-links">
    <a href="#" data-page="home">Home</a>
    <a href="#" data-page="videos">Videos</a>
    <a href="#" data-page="blog">Blog</a>
    <a href="#" data-page="prompts">Prompts</a>
    <a href="#" data-page="contact">Contact</a>
  </div>
</nav>

<main id="app-root">
  <!-- dynamic content will be injected -->
</main>

<footer>
  <div class="social-icons">
    <a href="https://youtube.com/@salithatech?si=GieC0PbcIxtNjh6v"><i class="fab fa-youtube"></i></a>
    <a href="#"><i class="fab fa-facebook"></i></a>
    <a href="#"><i class="fab fa-twitter"></i></a>
    <a href="#"><i class="fab fa-github"></i></a>
  </div>
  <p style="margin-top: 1rem;">&copy; 2025 Salitha Tech Hub — Innovate. Build. Inspire.</p>
</footer>

<!-- Modal for full blog -->
<div id="blogModal" class="modal">
  <div class="modal-content">
    <span class="close-modal">&times;</span>
    <h2 id="modalTitle"></h2>
    <img id="modalImage" style="width:100%; border-radius:1rem; margin:1rem 0;" alt="blog">
    <div id="modalContent"></div>
    <small id="modalDate"></small>
  </div>
</div>

<script>
  // ---------- SAMPLE DATA ----------
  const videosData = [
    { id: 1, title: "Build AI Apps with GPT-4", description: "Learn how to integrate OpenAI API like a pro.", embedCode: '<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video" frameborder="0" allowfullscreen></iframe>' },
    { id: 2, title: "Modern Web Dev Crash Course", description: "Master HTML/CSS/JS with neon design trends.", embedCode: '<iframe src="https://www.youtube.com/embed/8m5_2E1bWb0" title="Web crash course" frameborder="0" allowfullscreen></iframe>' },
    { id: 3, title: "Prompt Engineering Secrets", description: "Boost your AI output quality.", embedCode: '<iframe src="https://www.youtube.com/embed/jpNo4EcVKRs" title="Prompt secrets" frameborder="0" allowfullscreen></iframe>' }
  ];

  const blogsData = [
    { id: 1, title: "Why LLMs are reshaping tech", image: "https://picsum.photos/id/1/400/200", content: "Full article: Large Language Models have revolutionized how we interact with machines. This comprehensive guide explores real-world applications and future trends.", date: "March 12, 2025" },
    { id: 2, title: "Building a Neon Design System", image: "https://picsum.photos/id/26/400/200", content: "Step-by-step tutorial on creating glassmorphic cards, neon borders, and smooth animations for modern SaaS products.", date: "April 5, 2025" },
    { id: 3, title: "Top 10 AI Tools for Devs", image: "https://picsum.photos/id/91/400/200", content: "From Copilot to Midjourney — boost your productivity and ship faster with these 10 innovative AI tools.", date: "March 28, 2025" }
  ];

  const promptsData = [
    { id: 1, title: "Code Explainer", description: "Explain any complex code snippet step by step as if I'm a junior dev." },
    { id: 2, title: "UX Copywriter", description: "Generate engaging microcopy for buttons, error messages, and onboarding flows." },
    { id: 3, title: "SQL Optimizer", description: "Rewrite messy SQL queries into efficient, indexed-friendly versions." },
    { id: 4, title: "React Component Architect", description: "Design a reusable component structure with hooks and TypeScript." }
  ];

  // global state
  let currentPage = "home";
  let searchTerm = "";
  let activeFilter = "all";

  // Helper: copy to clipboard
  function copyPrompt(text) {
    navigator.clipboard.writeText(text).then(() => {
      alert("✅ Prompt copied to clipboard!");
    }).catch(() => alert("❌ Copy failed"));
  }

  // render homepage
  function renderHome() {
    return `
      <div class="hero">
        <h1>Salitha Tech Hub</h1>
        <p>Next‑gen AI resources · Developer tutorials · Premium prompts</p>
      </div>
      <div class="container">
        <div style="display:flex; gap:2rem; flex-wrap:wrap; justify-content:center; margin-bottom:3rem;">
          <div class="card" style="text-align:center; flex:1;">
            <i class="fas fa-code" style="font-size:2.5rem; color:var(--neon-blue);"></i>
            <h3>100+ Video Tutorials</h3>
            <p>Hands-on coding & AI breakthroughs</p>
          </div>
          <div class="card" style="text-align:center; flex:1;">
            <i class="fas fa-blog" style="font-size:2.5rem; color:var(--neon-blue);"></i>
            <h3>Tech Insights</h3>
            <p>Stay ahead with expert articles</p>
          </div>
          <div class="card" style="text-align:center; flex:1;">
            <i class="fas fa-brain" style="font-size:2.5rem; color:var(--neon-blue);"></i>
            <h3>Prompt Library</h3>
            <p>Boost AI output quality</p>
          </div>
        </div>
        <div style="text-align:center; padding:2rem; border-radius:2rem; background:rgba(0,224,255,0.05);">
          <h3>⚡ Launch your AI journey</h3>
          <p style="color:var(--text-muted);">Videos, blogs, and powerful prompts — all in one hub.</p>
        </div>
      </div>
    `;
  }

  // Videos section
  function renderVideos() {
    let html = `<div class="container"><h2 style="margin:2rem 0 0 0;">📺 Latest Tech Videos</h2><div class="grid">`;
    videosData.forEach(vid => {
      html += `
        <div class="card">
          <div class="video-wrapper">${vid.embedCode}</div>
          <h3 style="margin-top:0.8rem;">${escapeHtml(vid.title)}</h3>
          <p>${escapeHtml(vid.description)}</p>
        </div>
      `;
    });
    html += `</div></div>`;
    return html;
  }

  // Blog section with search & categories filter (simple by title)
  function renderBlog() {
    let filteredBlogs = blogsData.filter(blog => 
      blog.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
      blog.content.toLowerCase().includes(searchTerm.toLowerCase())
    );
    if (activeFilter !== "all") {
      // dummy category: just simulate trending filter? for demo, we keep simple: just search
    }
    let html = `<div class="container"><h2 style="margin:1rem 0;">✍️ Tech Blog</h2>
      <div class="search-filter">
        <input type="text" id="searchInput" placeholder="🔍 Search blog posts..." value="${escapeHtml(searchTerm)}">
        <div class="filter-buttons">
          <button class="filter-btn ${activeFilter === 'all' ? 'active' : ''}" data-filter="all">All</button>
          <button class="filter-btn ${activeFilter === 'trending' ? 'active' : ''}" data-filter="trending">Trending</button>
        </div>
      </div>
      <div class="grid" id="blogGrid">`;
    filteredBlogs.forEach(blog => {
      html += `
        <div class="card blog-card" data-id="${blog.id}">
          <img src="${blog.image}" style="width:100%; border-radius:1rem; height:180px; object-fit:cover;" alt="blog">
          <h3>${escapeHtml(blog.title)}</h3>
          <div class="blog-date">📅 ${blog.date}</div>
          <p>${escapeHtml(blog.content.substring(0, 90))}...</p>
          <a href="#" class="read-more" data-id="${blog.id}">Read full article →</a>
        </div>
      `;
    });
    html += `</div></div>`;
    return html;
  }

  // Prompt Library with copy button & search
  function renderPrompts() {
    let filtered = promptsData.filter(p => 
      p.title.toLowerCase().includes(searchTerm.toLowerCase()) || 
      p.description.toLowerCase().includes(searchTerm.toLowerCase())
    );
    let html = `<div class="container"><h2 style="margin:2rem 0 0;">🧠 AI Prompt Library</h2>
      <div class="search-filter">
        <input type="text" id="searchInputPrompts" placeholder="Search prompts..." value="${escapeHtml(searchTerm)}">
      </div>
      <div class="grid">`;
    filtered.forEach(p => {
      html += `
        <div class="card">
          <div class="prompt-content">
            <h3><i class="fas fa-terminal"></i> ${escapeHtml(p.title)}</h3>
            <p>${escapeHtml(p.description)}</p>
            <button class="btn-copy" data-prompt-text="${escapeHtml(p.description)}">📋 Copy Prompt</button>
          </div>
        </div>
      `;
    });
    html += `</div></div>`;
    return html;
  }

  // Contact page
  function renderContact() {
    return `
      <div class="container" style="max-width:700px; margin: 3rem auto;">
        <div class="card" style="text-align:center;">
          <h2><i class="fas fa-envelope"></i> Get in touch</h2>
          <p style="margin:1rem 0;">Have questions or collab ideas? Reach out to our team.</p>
          <form id="contactForm" style="display:flex; flex-direction:column; gap:1rem;">
            <input type="text" placeholder="Your Name" style="padding:0.8rem; border-radius:2rem; border:none; background:#1a1f2a; color:white;">
            <input type="email" placeholder="Email address" style="padding:0.8rem; border-radius:2rem; border:none; background:#1a1f2a; color:white;">
            <textarea placeholder="Message" rows="4" style="padding:0.8rem; border-radius:1.5rem; background:#1a1f2a; border:none; color:white;"></textarea>
            <button type="submit" style="background:var(--neon-blue); border:none; padding:0.8rem; border-radius:2rem; font-weight:bold; cursor:pointer;">Send Message</button>
          </form>
          <p style="margin-top:1rem; font-size:0.8rem;">📧 hello@salithatech.com</p>
        </div>
      </div>
    `;
  }

  // Attach event listeners after rendering dynamic content
  function attachPageEvents() {
    // Blog "read more" modal
    document.querySelectorAll('.read-more').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        const blogId = parseInt(btn.getAttribute('data-id'));
        const blog = blogsData.find(b => b.id === blogId);
        if(blog) {
          document.getElementById('modalTitle').innerText = blog.title;
          document.getElementById('modalImage').src = blog.image;
          document.getElementById('modalContent').innerHTML = `<p>${escapeHtml(blog.content)}</p>`;
          document.getElementById('modalDate').innerText = blog.date;
          document.getElementById('blogModal').style.display = 'flex';
        }
      });
    });

    // Copy prompt buttons
    document.querySelectorAll('.btn-copy').forEach(btn => {
      btn.addEventListener('click', () => {
        const promptText = btn.getAttribute('data-prompt-text');
        if(promptText) copyPrompt(promptText);
      });
    });

    // Search inputs for blog & prompts
    const searchInputBlog = document.getElementById('searchInput');
    if(searchInputBlog) {
      searchInputBlog.addEventListener('input', (e) => {
        searchTerm = e.target.value;
        if(currentPage === 'blog') renderPage('blog');
        else if(currentPage === 'prompts') renderPage('prompts');
      });
    }
    const searchPrompt = document.getElementById('searchInputPrompts');
    if(searchPrompt) {
      searchPrompt.addEventListener('input', (e) => {
        searchTerm = e.target.value;
        renderPage('prompts');
      });
    }

    // filter buttons in blog (optional)
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const filter = e.target.getAttribute('data-filter');
        activeFilter = filter;
        if(currentPage === 'blog') renderPage('blog');
      });
    });

    // contact form alert
    const contactForm = document.getElementById('contactForm');
    if(contactForm) {
      contactForm.addEventListener('submit', (e) => {
        e.preventDefault();
        alert('✨ Message sent! (demo mode)');
        contactForm.reset();
      });
    }

    // close modal
    const modal = document.getElementById('blogModal');
    const closeSpan = document.querySelector('.close-modal');
    if(closeSpan) {
      closeSpan.onclick = () => modal.style.display = 'none';
      window.onclick = (e) => { if(e.target === modal) modal.style.display = 'none'; };
    }
  }

  // escape html to avoid injection
  function escapeHtml(str) {
    if(!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if(m === '&') return '&amp;';
      if(m === '<') return '&lt;';
      if(m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // main renderer
  function renderPage(page) {
    currentPage = page;
    let content = '';
    if(page === 'home') content = renderHome();
    else if(page === 'videos') content = renderVideos();
    else if(page === 'blog') content = renderBlog();
    else if(page === 'prompts') content = renderPrompts();
    else if(page === 'contact') content = renderContact();
    else content = renderHome();

    document.getElementById('app-root').innerHTML = content;

    // reattach dynamic events after rendering
    if(page === 'blog') attachPageEvents();
    else if(page === 'prompts') attachPageEvents();
    else if(page === 'contact') attachPageEvents();
    else attachPageEvents();  // for home? read-more not present, safe.
    // additional universal event for copy & modal read-more inside renderBlog already attached.
    // for videos no special events
    // set active link style
    document.querySelectorAll('.nav-links a').forEach(link => {
      if(link.getAttribute('data-page') === page) link.classList.add('active');
      else link.classList.remove('active');
    });
    // re-run search input event if needed (since inputs re-created)
    if(page === 'blog') {
      const sInput = document.getElementById('searchInput');
      if(sInput) sInput.value = searchTerm;
    }
    if(page === 'prompts') {
      const sPrompt = document.getElementById('searchInputPrompts');
      if(sPrompt) sPrompt.value = searchTerm;
    }
    // reattach filter buttons for blog again after render
    if(page === 'blog') {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const filter = e.target.getAttribute('data-filter');
          activeFilter = filter;
          renderPage('blog');
        });
      });
    }
  }

  // navigation event listeners
  function initNavigation() {
    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const page = link.getAttribute('data-page');
        searchTerm = "";   // optional reset on nav for blog/prompts? better reset search
        if(page !== 'blog' && page !== 'prompts') searchTerm = "";
        renderPage(page);
      });
    });
  }

  // initial load
  renderPage('home');
  initNavigation();
  // attach resize or extra (optional)
</script>
</body>
</html>
